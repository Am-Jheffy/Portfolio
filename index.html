<!doctype html>
<html lang="en">
  <head>
    <!-- Technical Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://jefferson-no.netlify.app/" />

    <!-- Primary Meta Tags -->
    <title>Jefferson Onunwa | Frontend Engineer & Architect</title>
    <meta
      name="title"
      content="Jefferson Onunwa | Frontend Engineer & Architect"
    />
    <meta
      name="description"
      content="From proofs to production. I architect high-performance, type-safe client systems and enterprise B2B interfaces."
    />
    <meta name="author" content="Jefferson Onunwa" />
    <meta
      name="keywords"
      content="Frontend Engineer, React, TypeScript, Tailwind CSS, Software Developer, B2B SaaS, Axiom Vault, BaseStack, Port Harcourt"
    />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jefferson-no.netlify.app/" />
    <meta property="og:site_name" content="Jefferson Onunwa" />
    <meta property="og:title" content="Jefferson Onunwa | Frontend Engineer" />
    <meta
      property="og:description"
      content="From proofs to production. I architect high-performance, type-safe client systems and enterprise B2B interfaces."
    />
    <meta
      property="og:image"
      content="https://jefferson-no.netlify.app/og-image.png"
    />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://jefferson-no.netlify.app/" />
    <meta
      property="twitter:title"
      content="Jefferson Onunwa | Frontend Engineer"
    />
    <meta
      property="twitter:description"
      content="From proofs to production. I architect high-performance, type-safe client systems and enterprise B2B interfaces."
    />
    <meta
      property="twitter:image"
      content="https://jefferson-no.netlify.app/og-image.png"
    />

    <!-- Theme color for mobile browser chrome — matches --color-bg exactly -->
    <meta name="theme-color" content="#0a0a0c" />

    <!-- Favicon: SVG for modern browser tabs, PNG specifically for iOS home-screen icons -->
    <link rel="icon" type="image/png" href="/mylogo.png?v=2" />
    <link rel="icon" type="image/svg+xml" href="/mylogo.png?v=2" />
    <link rel="apple-touch-icon" href="/mylogo.png?v=2" />


    <!-- Fonts — required for the site's typography (Space Grotesk / Inter / JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
